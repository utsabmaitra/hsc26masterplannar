<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Plannar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
                
        :root {
            --bg: #0b1120; --card: #1e293b; --accent: #38bdf8;
            --success: #10b981; --text: #f1f5f9; --sub: #94a3b8; --border: #334155;
            --error: #ef4444;
            --premium-grad: linear-gradient(135deg, #10b981, #059669);
            --error-grad: linear-gradient(135deg, #ef4444, #b91c1c);
            --neon-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
                
        .header { text-align: center; padding: 15px 0; position: sticky; top: 0; background: rgba(11, 17, 32, 0.95); z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
        
        .countdown-box {
            display: inline-flex; gap: 6px; background: rgba(15, 23, 42, 0.8);
            padding: 10px 15px; border-radius: 12px; border: 1px solid var(--accent);
            box-shadow: var(--neon-shadow); margin: 8px 0;
            transition: 0.3s ease;
        }

        /* --- Global Timer States --- */
        .timer-locked { opacity: 0.3; filter: grayscale(1); }
        
        .timer-running { 
            animation: timerBlink 2s infinite; 
            opacity: 1 !important; 
            filter: none !important; 
        }

        @keyframes timerBlink {
            0%, 100% { border-color: var(--accent); box-shadow: var(--neon-shadow); }
            50% { border-color: #0ea5e9; box-shadow: 0 0 25px rgba(56, 189, 248, 0.7); }
        }

        .time-unit { display: flex; flex-direction: column; align-items: center; min-width: 35px; }
        .time-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; color: var(--accent); line-height: 1; }
        .time-label { font-size: 7px; color: var(--sub); text-transform: uppercase; margin-top: 3px; font-weight: 700; }
        .sep { font-size: 18px; font-weight: 800; color: var(--border); line-height: 1; }

        .progress-container { width: 92%; max-width: 400px; margin: 8px auto; }
        .progress-bar { height: 5px; background: #334155; border-radius: 10px; overflow: hidden; margin-bottom: 4px; }
        #fill { height: 100%; width: 0%; background: linear-gradient(90deg, #38bdf8, #10b981); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

/* বাটন স্টাইল - যা সবসময় সমান থাকবে */
.start-btn { 
    flex: 1; /* স্ক্রিন যাই হোক, দুই বাটন সবসময় সমান জায়গা নিবে */
    background: linear-gradient(135deg, #38bdf8, #1e3a8a); 
    color: white; 
    border: none; 
    padding: 10px 4px; /* প্যাডিং মোবাইলের জন্য অপ্টিমাইজড */
    border-radius: 30px; 
    font-weight: 800; 
    cursor: pointer; 
    font-size: 10px; /* লেখা যেন মোবাইলে আটে */
    transition: 0.3s; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* সেশন শুরু হলে বাটনের লুক */
.btn-running { 
    background: transparent !important; 
    border: 2px solid var(--success) !important; 
    color: var(--success) !important; 
    animation: btnBlink 1.5s infinite; 
}
        @keyframes btnBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Missed Task: Left border removed */
        tr.missed { background: rgba(239, 68, 68, 0.25) !important; animation: missedBlink 2s infinite; }
        @keyframes missedBlink { 0%, 100% { background: rgba(239, 68, 68, 0.2); } 50% { background: rgba(239, 68, 68, 0.35); } }

        .row-timer {
            display: flex; gap: 2px; background: rgba(56, 189, 248, 0.05);
            padding: 3px 4px; border-radius: 4px; border: 1px solid rgba(56, 189, 248, 0.2);
            margin-top: 4px; justify-content: center; align-items: center;
        }
        .rt-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; color: var(--accent); }
        .rt-sep { color: var(--border); font-size: 9px; font-weight: 800; }

        .container { max-width: 950px; margin: 10px auto; background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #0f172a; color: var(--sub); padding: 12px 4px; font-size: 10px; text-transform: uppercase; text-align: center; }
        
        td { 
            padding: 10px 4px; border-bottom: 1px solid var(--border); font-size: 12px; 
            vertical-align: middle; text-align: center; white-space: normal; 
            word-wrap: break-word; overflow-wrap: break-word; 
        }

        .col-date { width: 80px; }
        .col-task { width: auto; }
        .col-bio { width: 90px; }
        .col-done { width: 45px; }

        .t-cell, .col-bio { 
            cursor: grab; 
            padding: 10px 8px; 
            transition: opacity 0.15s ease-in-out, transform 0.2s ease, background 0.2s ease; 
        }
        .t-cell:active, .col-bio:active { 
            cursor: grabbing; 
            opacity: 0.6; 
            transform: scale(0.95); 
        }
        /* Cell background transparent রাখা জরুরি যেন Row এর কালার দেখা যায় */
        td { background: transparent !important; } 

        .drag-over { 
            /* background তুলে দিয়ে শুধু একটা গ্লো আর বর্ডার দিচ্ছি */
            background: rgba(56, 189, 248, 0.1) !important; 
            outline: 2px solid var(--accent) !important;
            outline-offset: -2px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            z-index: 5;
        }

        .month-row { background: #1e3a8a; color: #fff; font-weight: 800; text-align: center; font-size: 12px; }
        tr.done { background: rgba(16, 185, 129, 0.04); color: var(--sub); }
        tr.done td:not(.status-td) { text-decoration: line-through; opacity: 0.4; cursor: not-allowed !important; }

        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--success); }

        #toast-box { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        /* --- Butter Smooth Toast Exit Animation --- */
.toast { 
    background: var(--premium-grad); color: white; padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: 12px; 
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); 
    animation: toastPop 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
    /* যাওয়ার সময় যেন হুট করে গায়েব না হয়ে স্মুথলি যায় */
    transition: opacity 0.4s ease, transform 0.4s ease; 
}
        .toast.red { background: var(--error-grad); }
        @keyframes toastPop { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- Butter Smooth Modal Animations --- */
#modal-overlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; 
    z-index: 10000; backdrop-filter: blur(6px);
    /* display: none এর বদলে opacity এবং visibility ব্যবহার করা হলো স্মুথ ট্রানজিশনের জন্য */
    opacity: 0; visibility: hidden; pointer-events: none; 
    transition: opacity 0.3s ease, visibility 0.3s ease; 
}
#modal-overlay.show { 
    opacity: 1; visibility: visible; pointer-events: auto; 
}
.modal { 
    background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid var(--border); 
    max-width: 300px; width: 85%; text-align: center; 
    /* পপ-আপ স্প্রিং ইফেক্ট */
    transform: scale(0.8) translateY(20px); 
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}
#modal-overlay.show .modal { 
    transform: scale(1) translateY(0); 
}

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { padding: 10px; border-radius: 8px; border: none; font-weight: 700; flex: 1; cursor: pointer; }
        
        .particle { position: fixed; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; pointer-events: none; animation: burst 0.6s ease-out forwards; }
        @keyframes burst { to { transform: translate(var(--x), var(--y)); opacity: 0; } }
        
        /* Scroll Mode Styles */
.container.scroll-active {
    overflow-x: auto !important;
}
.container.scroll-active table {
    width: 900px !important; /* স্ক্রল মোডে টেবিলটি ৯০০ পিক্সেল চওড়া হবে */
    table-layout: auto !important;
}
/* Scroll Button Active State */
#scroll-btn.active {
    background: transparent !important;
    border: 2px solid var(--accent);
    color: var(--accent);
    box-shadow: var(--neon-shadow);
}

/* বাটন গ্রুপ - যা প্রগ্রেস বারের সমান চওড়া থাকবে */
.btn-group {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 12px auto;
    width: 92%; /* মোবাইলে দুই পাশে সামান্য গ্যাপ রেখে ফিট হবে */
    max-width: 400px;
}

/* Delete Button Styles */
.delete-row-btn {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid var(--error);
    color: var(--error);
    border-radius: 4px;
    font-size: 10px;
    padding: 3px 5px;
    cursor: pointer;
    margin-top: 5px;
    width: 100%;
    font-weight: bold;
    transition: 0.3s;
}
.delete-row-btn:hover {
    background: var(--error);
    color: white;
}

/* Inline Task Edit Pencil Icon */
.t-cell { position: relative; }
.edit-icon {
    position: absolute; 
    top: 2px; 
    right: 2px; 
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid var(--accent); 
    border-radius: 4px; 
    padding: 3px;
    font-size: 10px; 
    cursor: pointer; 
    display: none; /* ডিফল্টভাবে লুকানো থাকবে */
    z-index: 10;
    transition: 0.2s;
}
.t-cell:hover .edit-icon {
    display: block; /* সেলের ওপর মাউস নিলে দেখাবে */
}
.edit-icon:hover {
    background: var(--accent);
}

/* Row Delete Button */
.delete-row-btn {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid var(--error);
    color: var(--error);
    border-radius: 4px;
    font-size: 10px;
    padding: 3px 5px;
    cursor: pointer;
    margin-top: 5px;
    width: 100%;
    font-weight: bold;
    transition: 0.3s;
}
.delete-row-btn:hover { background: var(--error); color: white; }
/* Inline Task Edit Pencil Icon */
.t-cell { position: relative; cursor: pointer; }
.edit-icon {
    position: absolute; 
    top: 4px; 
    right: 4px; 
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid var(--accent); 
    border-radius: 4px; 
    padding: 4px;
    font-size: 11px; 
    cursor: pointer; 
    opacity: 0; 
    visibility: hidden;
    transition: all 0.2s ease;
    z-index: 10;
}
.t-cell:hover .edit-icon {
    opacity: 1; 
    visibility: visible;
}
.edit-icon:hover {
    background: var(--accent);
    color: #fff;
}

/* Hide edit icon and disable pointer events for done tasks */
tr.done .t-cell { cursor: not-allowed; }
tr.done .edit-icon { display: none !important; opacity: 0 !important; visibility: hidden !important; }

.app-footer {
    margin-top: 40px;
    padding: 20px 10px;
    border-top: 1px solid var(--border);
    text-align: center;
    background: rgba(15, 23, 42, 0.5);
    backdrop-filter: blur(5px);
}

.footer-content p {
    font-size: 11px;
    color: var(--sub);
    margin: 0 0 10px 0;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.contact-links {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
}

.contact-links a {
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 4px;
}

.contact-links a:hover {
    color: #fff;
    text-shadow: 0 0 10px var(--accent);
}

.dot {
    width: 4px;
    height: 4px;
    background: var(--border);
    border-radius: 50%;
}

<body>

    <div id="modal-overlay">
        <div class="modal">
            <h4 id="modal-title" style="margin:0; color:var(--accent);">Confirm Action</h4>
            <p id="modal-text" style="color:var(--sub); font-size:13px; margin-top:8px;"></p>
            <div class="modal-btns" id="modal-actions"></div>
        </div>
    </div>

    <div id="toast-box"></div>

    <div class="header">
        <h3 style="margin:0; color:var(--accent); font-size: 16px;">🚀 PERSONAL PLANNAR</h3>
        <div class="countdown-box timer-locked" id="global-timer-box">
            <div class="time-unit"><span class="time-val" id="d-val">00</span><span class="time-label">Days</span></div>
            <span class="sep">:</span>
            <div class="time-unit"><span class="time-val" id="h-val">00</span><span class="time-label">Hours</span></div>
            <span class="sep">:</span>
            <div class="time-unit"><span class="time-val" id="m-val">00</span><span class="time-label">Mins</span></div>
            <span class="sep">:</span>
            <div class="time-unit"><span class="time-val" id="s-val">00</span><span class="time-label">Secs</span></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar"><div id="fill"></div></div>
            <p id="stat" style="font-size: 9px; color: var(--sub); margin: 0; font-weight: 700;">0% Completed</p>
        </div>
        <div class="btn-group">
    <button class="start-btn" id="start-btn" onclick="startTimer()">START SESSION</button>
    <button class="start-btn" id="scroll-btn" onclick="toggleScroll()">🔓 ENABLE SCROLL</button>
    <button class="start-btn" id="col-btn" onclick="openColumnEditor()" style="flex: 0.5;">⚙️ EDIT</button>
</div>

    <div class="container">
        <table>
            <thead>
                <tr id="table-header-row">
                    </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

<script>
    
          // আজকের ডেট এবং সাল ডায়নামিকভাবে বের করার কোড
    const today = new Date();
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const fullMonthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    const currentYear = today.getFullYear();
    const currentMonthFull = fullMonthNames[today.getMonth()];
    const currentMonthShort = monthNames[today.getMonth()];
    const currentDate = String(today.getDate()).padStart(2, '0');

    // যেমন: "April 2026" বা "May 2024"
    const dynamicMonthYear = `${currentMonthFull} ${currentYear}`; 
    // যেমন: "Apr 05" বা "May 12"
    const dynamicDateStr = `${currentMonthShort} ${currentDate}`; 

    const initialPlan = [
        { 
            m: dynamicMonthYear, 
            d: [ { date: dynamicDateStr, 
                    t1: "Click '⚙️ EDIT' to unlock",
                    t2: "Enable '✏️ Show Task Edit Icons'",
                    t3: "Then double-tap here to write ✍️" } ] 
        }
    ];
    
    // সাউন্ড ইফেক্টস কনফিগারেশন
const sounds = {
    success: new Audio('success.mp3'), // টাস্ক ডান হলে
    click: new Audio('click.mp3'),   // বাটন বা সোয়াপ করলে
    alert: new Audio('alert.mp3'),    // এরর বা ওয়ার্নিং আসলে
    completion: new Audio('completion.mp3')
};

// সাউন্ড প্লে করার হেল্পার ফাংশন
function playSfx(type) {
    if (sounds[type]) {
        // সাউন্ড ফাইলটি লোড হয়েছে কি না তা নিশ্চিত করা
        const sound = sounds[type];
        sound.currentTime = 0;
        
        const playPromise = sound.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("Autoplay prevented or file missing:", error);
            });
        }
    }
}

    const STORAGE_KEY = "personal_plannar_v27_final";
        // ডিফল্ট কলামের লিস্ট
    const defaultCols = [
        { id: "t1", name: "Task 1" },
        { id: "t2", name: "Task 2" },
        { id: "t3", name: "Task 3" }
    ];

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { 
        tasks: initialPlan, done: {}, activeId: null, startTime: null, columns: defaultCols 
    };

    // যদি পুরোনো সেভ করা ডাটায় কলাম না থাকে, তবে ডিফল্ট কলাম বসিয়ে দেওয়া
    if (!state.columns) state.columns = defaultCols;

            let timerRef = null;
    let draggedSource = null;
    let scrollSpeed = 0;
    let scrollAnimationFrame = null;
    let isDeleteMode = false; // Row ডিলিট মোড ট্র্যাক করার জন্য
    let isTaskEditMode = false; // পেন্সিল আইকন মোড ট্র্যাক করার জন্য (নতুন)
    
    function getRealDate(monthYearStr, dayStr) {
        const monthMap = { "Jan": 0, "Feb": 1, "Mar": 2, "Apr": 3, "May": 4, "Jun": 5, "Jul": 6, "Aug": 7, "Sep": 8, "Oct": 9, "Nov": 10, "Dec": 11 };
        const monthPart = dayStr.split(" ")[0];
        const day = parseInt(dayStr.split(" ")[1]);
        const year = parseInt(monthYearStr.split(" ")[1]);
        return new Date(year, monthMap[monthPart], day);
    }

    function startAutoScroll() {
        if (scrollSpeed !== 0) {
            window.scrollBy(0, scrollSpeed);
            scrollAnimationFrame = requestAnimationFrame(startAutoScroll);
        }
    }

    window.addEventListener('dragover', (e) => {
        if (!draggedSource) return;
        e.preventDefault(); // স্মুথ ড্রপের জন্য এটা জরুরি

        const edge = 150; // স্ক্রিনের কত কাছে গেলে স্ক্রোল শুরু হবে
        const speedMultiplier = 20; // ম্যাক্সিমাম স্পিড

        // ডায়নামিক স্পিড ক্যালকুলেশন (কাছে গেলে স্পিড বাড়বে)
        if (e.clientY < edge) {
            scrollSpeed = -Math.max(1, speedMultiplier * (1 - e.clientY / edge));
        } else if (window.innerHeight - e.clientY < edge) {
            scrollSpeed = Math.max(1, speedMultiplier * (1 - (window.innerHeight - e.clientY) / edge));
        } else {
            scrollSpeed = 0;
        }

        if (scrollSpeed !== 0 && !scrollAnimationFrame) startAutoScroll();
        else if (scrollSpeed === 0 && scrollAnimationFrame) { cancelAnimationFrame(scrollAnimationFrame); scrollAnimationFrame = null; }
    });
    window.addEventListener('dragend', () => { 
        scrollSpeed = 0; 
        draggedSource = null;
        if (scrollAnimationFrame) {
            cancelAnimationFrame(scrollAnimationFrame);
            scrollAnimationFrame = null;
        }
        
        // ড্র্যাগ শেষ হওয়া মাত্র পুরো টেবিল ঝকঝকে পরিষ্কার
        document.querySelectorAll('.drag-over').forEach(cell => {
            cell.classList.remove('drag-over');
        });
    });

    function init(isFirstLoad = false) {
    const tbody = document.getElementById('table-body');
    const theadRow = document.getElementById('table-header-row');
    tbody.innerHTML = '';
    
    // ১. ডায়নামিক হেডার বানানো
    let headerHTML = `<th class="col-date">Date</th>`;
    state.columns.forEach(col => {
        headerHTML += `<th class="col-task">${col.name}</th>`;
    });
    headerHTML += `<th class="col-done">Done</th>`;
    theadRow.innerHTML = headerHTML;

    let globalId = 1;
    const now = new Date();
    now.setHours(0, 0, 0, 0);

    state.tasks.forEach(month => {
        tbody.insertAdjacentHTML('beforeend', `<tr class="month-row"><td colspan="${state.columns.length + 2}">${month.m}</td></tr>`);
        month.d.forEach(day => {
            const id = globalId++;
            day.id = id;
            const taskDate = getRealDate(month.m, day.date);
            const isDone = state.done[id];
            const isMissed = state.activeId && !isDone && taskDate < now;
            const rowClass = isDone ? 'done' : (isMissed ? 'missed' : '');
            const isChecked = isDone ? 'checked' : '';
            
            const tr = document.createElement('tr');
            tr.className = rowClass; tr.id = `row-${id}`;

                                    // ২. ডায়নামিক টাস্ক সেল (ডাবল ক্লিক + পেন্সিল আইকন)
            let taskCellsHTML = '';
            state.columns.forEach(col => {
                taskCellsHTML += `
                <td class="t-cell" draggable="true" data-id="${id}" data-field="${col.id}" ondblclick="editTask(${id}, '${col.id}')">
                    <span class="task-text">${day[col.id] || ''}</span>
                    ${isTaskEditMode ? `<span class="edit-icon" title="Edit Task" onclick="event.stopPropagation(); editTask(${id}, '${col.id}')">✏️</span>` : ''}
                </td>`;
            });

            tr.innerHTML = `
                <td class="col-date">
                    ${day.date}
                    <div class="row-timer ${state.activeId ? '' : 'timer-locked'}" id="rt-${id}">
                        <span class="rt-val" id="rt-h-${id}">24</span><span class="rt-sep">:</span>
                        <span class="rt-val" id="rt-m-${id}">00</span><span class="rt-sep">:</span>
                        <span class="rt-val" id="rt-s-${id}">00</span>
                    </div>
                    ${(isDeleteMode && !isDone) ? `<button class="delete-row-btn" onclick="deleteSpecificRow(${id})">🗑️ Delete</button>` : ''}
                </td>
                ${taskCellsHTML}
                <td class="status-td col-done">
                    <input type="checkbox" onclick="handleTick(${id}, this)" ${isChecked}>
                </td>
            `;            

            tr.querySelectorAll('[draggable="true"]').forEach(cell => {
                cell.addEventListener('dragstart', (e) => handleDragStart(e, id, cell.getAttribute('data-field')));
                cell.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if(!state.done[id] && draggedSource) {
                        document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
                        cell.classList.add('drag-over');
                    }
                });
                cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
                cell.addEventListener('drop', (e) => handleDrop(e, id, cell));
            });

            tbody.appendChild(tr);
        });
    });

    if (state.activeId) {
        updateButtonUI(true);
        const globalBox = document.getElementById('global-timer-box');
        globalBox.classList.remove('timer-locked');
        globalBox.classList.add('timer-running');
        if (isFirstLoad) checkMissedDays();
    }
    runTimer();
}

    function runTimer() {
        if (timerRef) clearInterval(timerRef);
        timerRef = setInterval(updateStats, 1000);
        updateStats();
    }

    function updateStats() {
        let total = 0; state.tasks.forEach(m => total += m.d.length);
        const done = Object.keys(state.done).filter(k => !isNaN(k)).length;
        const per = Math.round((done / total) * 100) || 0;
        document.getElementById('fill').style.width = per + '%';
        document.getElementById('stat').innerText = `${per}% Overall Progress (${done}/${total})`;

        if (!state.activeId) return;

        let totalSec = total * 86400; 
        const firstTask = state.tasks[0].d[0];
        const startDate = getRealDate(state.tasks[0].m, firstTask.date);
        const elapsedSinceStart = Math.floor((Date.now() - startDate.getTime()) / 1000);
        let remainingGlobal = totalSec - elapsedSinceStart;
        updateCountdownUI(remainingGlobal < 0 ? 0 : remainingGlobal);

        const now = new Date();
        let gid = 1;
        state.tasks.forEach(month => {
            month.d.forEach(day => {
                const taskDate = getRealDate(month.m, day.date);
                const endOfDay = new Date(taskDate);
                endOfDay.setHours(23, 59, 59, 999);
                let diff = Math.floor((endOfDay.getTime() - now.getTime()) / 1000);
                if (diff < 0) diff = 0;
                if (diff > 86400) diff = 86400;
                updateRowTimerUI(gid++, diff);
            });
        });
    }

    function updateRowTimerUI(id, s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        const hEl = document.getElementById(`rt-h-${id}`);
        if (hEl) {
            hEl.innerText = h.toString().padStart(2, '0');
            document.getElementById(`rt-m-${id}`).innerText = m.toString().padStart(2, '0');
            document.getElementById(`rt-s-${id}`).innerText = sec.toString().padStart(2, '0');
        }
    }

    function updateCountdownUI(s) {
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        document.getElementById('d-val').innerText = d.toString().padStart(2, '0');
        document.getElementById('h-val').innerText = h.toString().padStart(2, '0');
        document.getElementById('m-val').innerText = m.toString().padStart(2, '0');
        document.getElementById('s-val').innerText = sec.toString().padStart(2, '0');
    }

    function handleTick(id, box) {
    if (state.done[id]) { box.checked = true; return; }
    
    if (!state.activeId) {
        box.checked = false;
        playSfx('alert');
        showModal("Not Started! ⚠️", "Start your session to mark tasks.", [
            { label: "Close", class: "btn-cancel", onClick: closeModal },
            { label: "Start Now", class: "btn-confirm", onClick: startTimer }
        ]); 
        return;
    }
    
    box.checked = false;

    // ১. টাস্কের ডেট এবং মাস বের করা
    let taskDateStr = "";
    let monthYearStr = "";
    state.tasks.forEach(month => {
        month.d.forEach(day => {
            if(day.id === id) {
                taskDateStr = day.date;
                monthYearStr = month.m;
            }
        });
    });

    const taskDate = getRealDate(monthYearStr, taskDateStr);
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // ২. ডেট অনুযায়ী Dynamic Message সেট করা
    let message = "";
    if (taskDate.getTime() === today.getTime()) {
        message = `Did you complete all your tasks for today?`;
    } else if (taskDate < today) {
        message = `Did you complete these backlog tasks for "${taskDateStr}"?`;
    } else {
        message = `Ready to finish future tasks for "${taskDateStr}" in advance?`;
    }

    showModal("Mark as Completed? ✅", message, [
        { label: "Cancel", class: "btn-cancel", onClick: closeModal },
        { label: "Done!", class: "btn-confirm", onClick: () => confirmMark(id, box) }
    ]);
}

    function confirmMark(id, box) {
        state.done[id] = true; box.checked = true;
        const row = document.getElementById(`row-${id}`);
        row.classList.remove('missed'); row.classList.add('done');
        let currentDay;
        state.tasks.forEach(m => m.d.forEach(d => { if(d.id === id) currentDay = d; }));
        if (state.activeId === id) { state.activeId = findNext(); }
        const rect = box.getBoundingClientRect(); burstEffect(rect.left+10, rect.top+10);
        showToast(`${currentDay.date} tasks completed! 🎯`);
        playSfx('success'); 
        checkChapter(currentDay);
        save(); updateStats(); closeModal();
    }

        function checkChapter(day) {
        // t1, t2, t3 হার্ডকোড না করে, সব ডায়নামিক কলাম থেকে টাস্ক কালেক্ট করা হলো
        const subjects = state.columns.map(col => day[col.id]);
        let itemsChecked = new Set(); 

        subjects.forEach(taskName => {
        // এখন এটি Ch- (Chapter), K- (Kobita), G- (Golpo) বা U- (Unit) সব চেক করবে
            if (taskName && (taskName.includes("Ch-") || taskName.includes("K-") || taskName.includes("G-") || taskName.includes("U-"))) {
                
                // Regex আপডেট করা হয়েছে যেন Ch, K, G বা U সবগুলোকে ধরতে পারে
                const match = taskName.match(/(.*?\b(Ch|K|G|U)-\d+)/);
                
                if (match) {
                    const baseItem = match[1].trim(); // যেমন: "Bng 1st K-02" বা "Phy 1st Ch-08"

                    if (itemsChecked.has(baseItem)) return;
                    itemsChecked.add(baseItem);

                    let allRowsOfItem = [];
                    
                    // পুরো প্ল্যানারের t1, t2, t3 সব কলামে এই চ্যাপ্টার/গল্পটি খুঁজবে
                    state.tasks.forEach(m => m.d.forEach(d => {
                        if ((d.t1 && d.t1.includes(baseItem)) || 
                            (d.t2 && d.t2.includes(baseItem)) || 
                            (d.t3 && d.t3.includes(baseItem))) {
                            allRowsOfItem.push(d.id);
                        }
                    }));

                    // যদি ওই আইটেমটি যেখানে যেখানে আছে সব জায়গাতেই 'Done' হয়ে থাকে
                    if (allRowsOfItem.length > 0 && allRowsOfItem.every(rid => state.done[rid])) {
                        showToast(`${baseItem} Fully Completed! 🏆`);
                        playSfx('completion');
                    }
                }
            }
        });
    }
    
    function isTodayTask(id) {
    let targetDay, targetMonth;

    state.tasks.forEach(m => {
        m.d.forEach(d => {
            if (d.id === id) {
                targetDay = d;
                targetMonth = m.m;
            }
        });
    });

    if (!targetDay) return false;

    const taskDate = getRealDate(targetMonth, targetDay.date);

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    return taskDate.getTime() === today.getTime();
}

    function checkMissedDays() {
        let missedCount = 0;
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        let globalId = 1;
        state.tasks.forEach(month => {
            month.d.forEach(day => {
                const taskDate = getRealDate(month.m, day.date);
                if (!state.done[globalId] && taskDate < now) missedCount++;
                globalId++;
            });
        });
        if (missedCount > 0) showToast(`You missed ${missedCount} days! 🔴`, true); playSfx('alert');
    }

    function startTimer() {
        if (state.activeId) return;
        const nextId = findNext();
        if (nextId) {
            state.activeId = nextId; state.startTime = Date.now();
            save(); updateButtonUI(true);
            
            const globalBox = document.getElementById('global-timer-box');
            globalBox.classList.remove('timer-locked');
            globalBox.classList.add('timer-running');
            
            document.querySelectorAll('.row-timer').forEach(el => el.classList.remove('timer-locked'));
            
            init(false);
            
            checkMissedDays();
            showToast("Session Started! 🚀"); 
            playSfx('success');
            closeModal();
        }
    }

    function findNext() {
        let gid = 1;
        for (const m of state.tasks) { for (const d of m.d) { if (!state.done[gid]) return gid; gid++; } }
        return null;
    }

    function updateButtonUI(running) {
    const btn = document.getElementById('start-btn');
    if (running) {
        btn.innerText = "● PROGRESS RUNNING";
        btn.classList.add("btn-running");
        btn.disabled = true; // বাটনটি আনক্লিকেবল হয়ে যাবে
        btn.style.cursor = "default";
    } else {
        btn.innerText = "START STUDY SESSION";
        btn.classList.remove("btn-running");
        btn.disabled = false;
        btn.style.cursor = "pointer";
    }
}

    function showToast(msg, isRed = false) {
    const t = document.createElement('div'); t.className = isRed ? 'toast red' : 'toast'; t.innerText = msg;
    document.getElementById('toast-box').appendChild(t);
    // যাওয়ার সময় নিচে নেমে এবং ছোট হয়ে মিলিয়ে যাওয়ার স্মুথ ইফেক্ট
    setTimeout(() => { 
        t.style.opacity = '0'; 
        t.style.transform = 'translateY(20px) scale(0.9)'; 
        setTimeout(() => t.remove(), 400); 
    }, 4000);
}

function showModal(title, text, actions) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-text').innerText = text;
    const actionBox = document.getElementById('modal-actions'); actionBox.innerHTML = '';
    actions.forEach(btn => {
        const b = document.createElement('button'); b.className = `modal-btn ${btn.class}`;
        b.innerText = btn.label; b.onclick = btn.onClick; actionBox.appendChild(b);
    });
    // display: flex এর বদলে 'show' ক্লাস অ্যাড করা হলো
    document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() { 
    playSfx('click');
    // display: none এর বদলে 'show' ক্লাস রিমুভ করা হলো
    document.getElementById('modal-overlay').classList.remove('show'); 
}

    function handleDragStart(e, id, field) { 
        if(state.done[id]) { e.preventDefault(); showToast("Completed tasks are locked! 🔒"); 
        playSfx('alert'); 
        return; } 
        draggedSource = { id, field };
    }

        function handleDrop(e, targetId, targetCell) {
        e.preventDefault();
        targetCell.classList.remove('drag-over');
        if (!draggedSource) return;
        
        const targetField = targetCell.getAttribute('data-field');
        
        if (draggedSource.id === targetId && draggedSource.field === targetField) {
            draggedSource = null;
            return; 
        }

        if (state.done[targetId]) { 
            showToast("Cannot move tasks to a completed day! 🚫", true); 
            playSfx('alert'); 
            return; 
        }
        
        let sDay, tDay;
        state.tasks.forEach(m => m.d.forEach(d => { 
            if (d.id === draggedSource.id) sDay = d; 
            if (d.id === targetId) tDay = d; 
        }));

        if (sDay && tDay) {
            // ডাটা সোয়াপ: যদি undefined থাকে, তবে সেটিকে খালি স্ট্রিং ("") বানিয়ে দিবে
            const temp = sDay[draggedSource.field] || "";
            sDay[draggedSource.field] = tDay[targetField] || "";
            tDay[targetField] = temp;

            // ভ্যালুগুলো আপডেট করা
            const newSourceText = sDay[draggedSource.field];
            const newTargetText = tDay[targetField];

            // DOM আপডেট
            const sourceCell = document.querySelector(`td[data-id="${draggedSource.id}"][data-field="${draggedSource.field}"]`);
            
            if (sourceCell) {
                sourceCell.style.opacity = '0';
                targetCell.style.opacity = '0';

                // অ্যানিমেশন টাইমার
                setTimeout(() => {
                    // পুরো td রিপ্লেস না করে শুধু .task-text স্প্যানের লেখা চেঞ্জ করা হচ্ছে 
                    // এতে করে পেন্সিল আইকনটা (✏️) আর মুছে যাবে না!
                    sourceCell.querySelector('.task-text').innerHTML = newSourceText;
                    targetCell.querySelector('.task-text').innerHTML = newTargetText;
                    
                    sourceCell.style.opacity = '1';
                    targetCell.style.opacity = '1';
                }, 150); 
            }

            save(); 
            playSfx('click');
            showToast("Tasks Swapped! 🔄");
        }
        
        // সব কাজ শেষে draggedSource ক্লিয়ার করা হচ্ছে
        draggedSource = null;
    }    

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function burstEffect(x, y) {
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.setProperty('--x', (Math.random()*80 - 40) + 'px');
            p.style.setProperty('--y', (Math.random()*80 - 40) + 'px');
            document.body.appendChild(p); setTimeout(() => p.remove(), 600);
        }
    }

    init(true);
    // Service Worker Registration for Offline App
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered successfully.', reg))
                .catch(err => console.error('Service Worker registration failed:', err));
        });
    }
    
    // স্ক্রল মোড হ্যান্ডেল করার ফাংশন
function toggleScroll(isFromLoad = false) {
    const container = document.querySelector('.container');
    const btn = document.getElementById('scroll-btn');
    
    // পেজ লোড হওয়ার সময় কল হলে সাউন্ড বাজবে না, শুধু বাটনে ক্লিক করলেই বাজবে
    if (!isFromLoad) {
        playSfx('click');
    }
    
    const isScrollActive = container.classList.toggle('scroll-active');
    
    // বাটন টেক্সট এবং স্টাইল আপডেট
    if (isScrollActive) {
        btn.innerText = "🔒 DISABLE SCROLL";
        btn.classList.add('active');
    } else {
        btn.innerText = "🔓 ENABLE SCROLL";
        btn.classList.remove('active');
    }
    
    // লোকাল স্টোরেজে সেভ করে রাখা
    localStorage.setItem('personal_plannar_scroll_mode', isScrollActive);
}

// পেজ লোড হওয়ার সময় আগের সেটিংস চেক করা
window.addEventListener('DOMContentLoaded', () => {
    const savedScroll = localStorage.getItem('personal_plannar_scroll_mode') === 'true';
    if (savedScroll) {
        // 'true' প্যারামিটার পাস করছি যেন সাউন্ড না বাজে
        toggleScroll(true); 
    }
});

// কলাম এবং রো এডিটর মোডাল ওপেন করা

// নতুন কলাম ফিল্ড যোগ করা (ইউআই তে)
function addNewColumnUI() {
    playSfx('click');
    const list = document.getElementById('col-edit-list');
    const newIndex = list.children.length;
    const div = document.createElement('div');
    div.style.cssText = "margin-bottom:10px; display:flex; gap:5px;";

}

// কলামগুলো সেভ করা এবং টেবিল রিলোড করা
function saveColumns() {
    const inputs = document.querySelectorAll('input[id^="col-input-"]');
    let newCols = [];
    
    inputs.forEach((inp, idx) => {
        if(inp.value.trim() !== "") {
            // যদি আগের কলাম হয় তবে আগের ID (t1, t2) রাখবে, না হলে নতুন ID (t4, t5) বানাবে
            let id = (state.columns[idx] && state.columns[idx].id) ? state.columns[idx].id : `t${idx + 1}`;
            newCols.push({ id: id, name: inp.value.trim() });
        }
    });

    state.columns = newCols;
    save(); // লোকাল স্টোরেজে সেভ
    init(false); // টেবিল নতুন করে রেন্ডার করা
    closeModal();
    playSfx('success');
    showToast("Columns Updated Successfully! 🛠️");
}

// নতুন Row (Day) যোগ করা
function addNewRow() {
    if(state.tasks.length === 0) return;
    
    // প্ল্যানারের একদম শেষের মাস এবং দিন বের করা
    let lastMonth = state.tasks[state.tasks.length - 1];
    let lastDayObj = lastMonth.d[lastMonth.d.length - 1];
    
    // শেষ তারিখ থেকে ১ দিন বাড়ানো
    let lastDate = getRealDate(lastMonth.m, lastDayObj.date);
    lastDate.setDate(lastDate.getDate() + 1);
    
    // নতুন দিনের ফরম্যাট (যেমন: May 09)
    let monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    let newMonthStr = monthNames[lastDate.getMonth()] + " " + lastDate.getFullYear();
    let newDateStr = monthNames[lastDate.getMonth()] + " " + String(lastDate.getDate()).padStart(2, '0');
    
    // নতুন দিনের ডেটা তৈরি করা (কলামগুলো ফাঁকা থাকবে)
    let newDay = { date: newDateStr };
    state.columns.forEach(col => newDay[col.id] = ""); 
    
    // মাস কি একই আছে নাকি নতুন মাস শুরু হলো তা চেক করা
    let targetMonth = state.tasks.find(m => m.m === newMonthStr);
    if(targetMonth) {
        targetMonth.d.push(newDay);
    } else {
        state.tasks.push({ m: newMonthStr, d: [newDay] });
    }
    
    save();
    init(false);
    playSfx('success');
    showToast(`Added ${newDateStr} at the bottom! 📅`);
    closeModal();
}

// ডিলিট মোড অন/অফ করা
function toggleDeleteMode() {
    playSfx('click');
    isDeleteMode = !isDeleteMode;
    init(false); // টেবিল রিলোড হবে, ডিলিট বাটন দেখাবে/লুকাবে
    openColumnEditor(); // পপ-আপ রিলোড হবে যেন বাটন টেক্সট আপডেট হয়
}

// নির্দিষ্ট Row ডিলিট করা
function deleteSpecificRow(id) {
    if(!confirm("Are you sure you want to delete this specific day?")) return;
    
    // ওই নির্দিষ্ট আইডি যুক্ত দিনটি ডিলিট করে দেওয়া
    state.tasks.forEach(month => {
        month.d = month.d.filter(day => day.id !== id);
    });
    
    // যদি কোনো মাস পুরোপুরি খালি হয়ে যায়, তবে সেই মাস ডিলিট করে দেওয়া
    state.tasks = state.tasks.filter(month => month.d.length > 0);
    
    save();
    init(false);
    playSfx('alert');
    showToast("Row Deleted Successfully! 🗑️", true);
}

// ১. সুন্দর ডিজাইনের টাস্ক এডিট পপ-আপ
function editTask(id, field) {
    // ১. চেক করবে এডিট মোড অন আছে কি না (এটি আপনার সমস্যার সমাধান)
    if (!isTaskEditMode) {
        return; // এডিট মোড অফ থাকলে ফাংশন এখানেই থেমে যাবে
    }

    // ২. টাস্ক ডান থাকলে এডিট করা যাবে না
    if (state.done[id]) {
        playSfx('alert');
        showToast("Completed tasks cannot be edited! 🔒", true);
        return;
    }

    let targetDay;
    state.tasks.forEach(m => m.d.forEach(d => { if(d.id === id) targetDay = d; }));
    if(!targetDay) return;
    
    let currentVal = targetDay[field] || "";
    
    let inputHtml = `
        <div style="background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-top: 10px;">
            <p style="color:var(--sub); font-size:13px; margin:0 0 8px 0; font-weight: 500;">
                📝 Editing task for <span style="color:var(--accent)">${targetDay.date}</span>
            </p>
            <textarea id="edit-task-input" placeholder="Type your task here..." rows="4"
                style="width:100%; padding:12px; border-radius:6px; border:1px solid var(--accent); 
                       background:rgba(10, 15, 30, 0.9); color:var(--text); font-family:'Inter', sans-serif; 
                       font-size: 14px; resize: none; box-sizing: border-box; outline: none;"></textarea>
        </div>
    `;

    showModal("✏️ Edit Task", "", [
        { label: "Cancel", class: "btn-cancel", onClick: closeModal },
        { label: "Save Task", class: "btn-confirm", onClick: () => {
            let newVal = document.getElementById('edit-task-input').value;
            targetDay[field] = newVal;
            save();
            init(false);
            playSfx('success');
            showToast("Task Updated! ✏️");
            closeModal();
        }}
    ]);
    
    document.getElementById('modal-text').innerHTML = inputHtml;
    document.getElementById('edit-task-input').value = currentVal;
    document.getElementById('edit-task-input').focus();
}

// ২. নির্দিষ্ট কলাম ডিলিট করা (পপ-আপ সহ)
function deleteColumn(index) {
    if(state.columns.length <= 1) {
        playSfx('alert');
        showModal("⚠️ Warning", "You must have at least one column!", [
            { label: "Got it", class: "btn-cancel", onClick: openColumnEditor }
        ]);
        return;
    }
    
    showModal("🗑️ Delete Column", "Are you sure you want to delete this column? All tasks inside it will be hidden.", [
        { label: "Cancel", class: "btn-cancel", onClick: openColumnEditor }, 
        { label: "Delete", class: "btn-confirm", style: "background:var(--error);", onClick: () => {
            state.columns.splice(index, 1);
            save(); 
            openColumnEditor(); 
            init(false); 
            playSfx('success');
            showToast("Column Deleted! 🗑️", true);
        }}
    ]);
}

// ৩. নতুন Row অ্যাড করা (সঠিক Date Format ওয়ার্নিং পপ-আপ সহ)
function addCustomRow() {
    let dateVal = document.getElementById('new-row-date').value.trim();
    let dateRegex = /^[A-Z][a-z]{2} \d{2}$/; // e.g. Apr 01
    
    if(!dateRegex.test(dateVal)) {
        playSfx('alert');
        showModal("⚠️ Invalid Date Format", "Format needed: MMM DD (e.g. Apr 10)", [
            { label: "Try Again", class: "btn-cancel", onClick: openColumnEditor }
        ]);
        return; 
    }
    
    let newDay = { date: dateVal };
    state.columns.forEach(c => newDay[c.id] = ""); 
    
    let monthPart = dateVal.split(" ")[0];
    let targetMonth = state.tasks.find(m => m.m.startsWith(monthPart));
    
    if(targetMonth) {
        targetMonth.d.push(newDay);
    } else {
        // হার্ডকোড 2026 না দিয়ে, সর্বশেষ টাস্কের সাল বের করে সেটা ব্যবহার করা হলো
        let lastTaskMonth = state.tasks[state.tasks.length - 1].m;
        let currentYear = lastTaskMonth.split(" ")[1] || new Date().getFullYear();
        state.tasks.push({ m: monthPart + " " + currentYear, d: [newDay] });
    }
    
    save(); 
    init(false); 
    playSfx('success');
    showToast(`Row for ${dateVal} Added! 📅`);
    document.getElementById('new-row-date').value = ""; 
}

// ৪. Row Delete মোড অন/অফ করা
function toggleDeleteMode() {
    isDeleteMode = !isDeleteMode;
    init(false);
    openColumnEditor(); 
}

// ৫. নির্দিষ্ট Row ডিলিট করা (পপ-আপ সহ)
function deleteSpecificRow(id) {
    showModal("🗑️ Delete Day", "Are you sure you want to delete this specific day? This action cannot be undone.", [
        { label: "Cancel", class: "btn-cancel", onClick: closeModal },
        { label: "Delete", class: "btn-confirm", style: "background:var(--error);", onClick: () => {
            state.tasks.forEach(month => {
                month.d = month.d.filter(day => day.id !== id);
            });
            
            // ফাঁকা মাস মুছে ফেলা
            state.tasks = state.tasks.filter(month => month.d.length > 0);
            
            save();
            init(false);
            playSfx('alert');
            showToast("Row Deleted Successfully! 🗑️", true);
            closeModal();
        }}
    ]);
}

// টাস্ক এডিট (Pencil) মোড অন/অফ করা
function toggleTaskEditMode() {
    playSfx('click');
    isTaskEditMode = !isTaskEditMode;
    init(false); // টেবিল রিলোড হবে, পেন্সিল আইকন দেখাবে/লুকাবে
    openColumnEditor(); // পপ-আপ রিলোড হবে যেন বাটন টেক্সট আপডেট হয়
}
